  [-8.5069, 115.2625],  // Ritorno Ubud
  [-8.7000, 115.2631],  // Sanur
  [-8.7699, 115.4529],  // Kelingking
  [-8.7250, 115.4333],  // Crystal Bay
  [-8.7000, 115.2631],  // Sanur ritorno
  [-8.8292, 115.0850],  // Uluwatu
  [-8.7879, 115.1565],  // Jimbaran
  [-8.7180, 115.1686],  // Kuta finale
];

// ─── MAPPA INIT ───
const map = L.map('map', {
  center: [-8.5, 115.2],
  zoom: 10,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// ─── ROUTE ───
let routeLayer = L.polyline(routeCoords, {
  color: '#E53935', weight: 3, opacity: 0.8,
  dashArray: '8, 8', lineJoin: 'round',
}).addTo(map);

document.getElementById('route-toggle').addEventListener('change', function() {
  if (this.checked) map.addLayer(routeLayer);
  else map.removeLayer(routeLayer);
});

// ─── MARKERS ───
let markers = [];
let activeFilters = new Set(Object.keys(categories));

function createIcon(cat, inItinerary) {
  const cfg = categories[cat] || { color: "#888", icon: "📍" };
  const borderColor = inItinerary ? '#2E7D32' : '#B8860B';
  const glowColor   = inItinerary ? 'rgba(46,125,50,0.4)' : 'rgba(184,134,11,0.4)';
  const html = `
    <div style="
      width:36px; height:36px; border-radius:50%;
      background:${cfg.color};
      border:3px solid ${borderColor};
      display:flex; align-items:center; justify-content:center;
      font-size:16px; line-height:1;
      box-shadow:0 0 10px ${glowColor}, 0 2px 6px rgba(0,0,0,0.5);
      cursor:pointer;
    ">${cfg.icon}</div>`;
  return L.divIcon({ html, iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-20], className: '' });
}

function buildPopup(p) {
  const statusHtml = p.inItinerary
    ? `<span class="popup-status status-in">✓ Nel vostro itinerario</span>`
    : `<span class="popup-status status-opt">◆ Da valutare</span>`;
  const tipHtml = p.tip
    ? `<div class="popup-tip"><span>💡 Consiglio:</span><p>${p.tip}</p></div>` : '';
  return `
    <div class="popup-header">
      <h3>${p.name}</h3>
      <div class="cat">${categories[p.cat]?.icon || ''} ${p.cat} · ${p.day}</div>
    </div>
    <div class="popup-body">
      <p>${p.desc}</p>
      ${tipHtml}
      ${statusHtml}
    </div>`;
}

function renderMarkers() {
  markers.forEach(({ marker }) => map.removeLayer(marker));
  markers = [];
  points.forEach(p => {
    if (!activeFilters.has(p.cat)) return;
    const marker = L.marker([p.lat, p.lng], { icon: createIcon(p.cat, p.inItinerary) })
      .bindPopup(buildPopup(p), { maxWidth: 280, minWidth: 240 })
      .addTo(map);
    markers.push({ marker, point: p });
  });
  updateCounter();
}

// ─── FILTRI ───
const filtersEl = document.getElementById('filters');
Object.entries(categories).forEach(([cat, cfg]) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.style.background = cfg.color + '33';
  btn.style.color = cfg.color;
  btn.style.border = `1.5px solid ${cfg.color}`;
  btn.innerHTML = `${cfg.icon} ${cat}`;
  btn.addEventListener('click', () => {
    if (activeFilters.has(cat)) {
      activeFilters.delete(cat);
      btn.classList.remove('active');
    } else {
      activeFilters.add(cat);
      btn.classList.add('active');
    }
    renderMarkers();
  });
  filtersEl.appendChild(btn);
});

// ─── GIORNI ITINERARIO ───
const itineraryDays = [
  { days: "Gg 1–2", label: "Kuta — Arrivo", sub: "22–23 Aprile", lat: -8.7180, lng: 115.1686 },
  { days: "Gg 3–7", label: "Ubud — Cultura e natura", sub: "24–28 Aprile", lat: -8.5069, lng: 115.2625 },
  { days: "Gg 5",   label: "Monte Batur — Alba", sub: "26 Aprile", lat: -8.2424, lng: 115.3751 },
  { days: "Gg 6",   label: "Bedugul — Ulun Danu", sub: "27 Aprile", lat: -8.2756, lng: 115.1667 },
  { days: "Gg 7–8", label: "Nusa Penida", sub: "28–29 Aprile", lat: -8.7278, lng: 115.5444 },
  { days: "Gg 9–10",label: "Uluwatu — Kecak & spiagge", sub: "30 Apr–1 Mag", lat: -8.8292, lng: 115.0850 },
  { days: "Gg 10",  label: "Cena a Jimbaran", sub: "1 Maggio", lat: -8.7879, lng: 115.1565 },
  { days: "Gg 11–13",label: "Kuta — Relax e rientro", sub: "2–4 Maggio", lat: -8.7180, lng: 115.1686 },
];

const daysList = document.getElementById('days-list');
itineraryDays.forEach(d => {
  const el = document.createElement('div');
  el.className = 'day-item';
  el.innerHTML = `
    <div class="day-badge">${d.days}</div>
    <div class="day-info">
      <h4>${d.label}</h4>
      <p>${d.sub}</p>
    </div>`;
  el.addEventListener('click', () => {
    map.setView([d.lat, d.lng], 13, { animate: true });
  });
  daysList.appendChild(el);
});

// ─── COUNTER ───
function updateCounter() {
  const visible   = markers.length;
  const inIt      = markers.filter(m => m.point.inItinerary).length;
  const optional  = markers.filter(m => !m.point.inItinerary).length;
  document.getElementById('counter').innerHTML = `
    <b style="color:#6dcc6d">✓ Nel vostro itinerario:</b> ${inIt}<br>
    <b style="color:#d4a820">◆ Da valutare:</b> ${optional}<br>
    <b style="color:#a0c8c8">Totale visibili:</b> ${visible}
  `;
}

// ─── START ───
renderMarkers();
</script>
</body>
</html>
